<h1> Locations </h1>

<a routerLink="./create">add</a>

<ul>
  <li *ngFor="let location of locations$ |async; trackBy: trackLocation"
    (click)="edit(location)">
    {{location.name}}
    <div (click)="cancelEvent($event)">
      <button *ngIf="location.lat && location.long" (click)="showInGoogleMaps(location)">show -></button>
      <button (click)="delete(location)">delete</button>
    </div>
  </li>
</ul>
