<h1> Queens </h1>

<evb-button type="link" routerLink="./create">add</evb-button>

<ul>
  <li *ngFor="let queen of queens$ |async; trackBy: trackQueen"
    (click)="edit(queen)">
    <span>
      {{queen.name}}
      <span class="queen-color" [style.backgroundColor]="queen.color"></span>
    </span>


    <div (click)="cancelEvent($event)">
      <evb-button variant="danger" pill="true" ghost="true" (click)="delete(queen)">delete</evb-button>
    </div>
  </li>
</ul>
