<h1> Queens </h1>

<a routerLink="./create">add</a>

<ul>
  <li *ngFor="let queen of queens$ |async; trackBy: trackQueen"
    (click)="edit(queen)">
    <span>
      {{queen.name}}
      <span class="queen-color" [style.backgroundColor]="queen.color"></span>
    </span>


    <div (click)="cancelEvent($event)">
      <button (click)="delete(queen)">delete</button>
    </div>
  </li>
</ul>
