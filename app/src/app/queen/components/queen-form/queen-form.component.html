
<form [formGroup]="form">

  <input type="hidden" formControlName="id" />

  <div class="formcontrol">
    <label for="name">name</label>
    <input type="text" formControlName="name" id="name" />
  </div>

  <div class="formcontrol">
    <label for="color">color</label>
    <app-color-select formControlName="color" [colors]="colors"></app-color-select>
  </div>

  <div class="formcontrol">
    <label for="year">year</label>
    <input type="number" formControlName="year" id="year" [min]="currentYear - 10" [max]="currentYear" />
  </div>

  <div class="buttons">
    <a [routerLink]="edit ? '../..' : '..'">cancel</a>
    <button (click)="save()" [disabled]="form.invalid || form.pristine">save</button>
  </div>

</form>
