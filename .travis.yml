dist: xenial

# frontend
language: node_js

node_js:
  - "10"
  - "12"

cache:
  directories:
    - $HOME/app/node_modules
  cache: yarn

before_script: 
  - cd app
  - yarn install --frozen-lockfile

script:
  - yarn lint
  - yarn test  # --coverage
  - yarn build --prod --base-href /beez/ # base-href needed for github pages

deploy:
  provider: pages
  skip_cleanup: true
  github_token: $GITHUB_TOKEN  # Set in the settings page of your repository, as a secure variable
  keep_history: true
  local_dir: app/dist/beez
  on:
    branch: master


# backend
language: node_js

node_js:
  - "10"
  - "11"
  - "12"

cache:
  directories:
    - $HOME/api/node_modules
  cache: yarn

before_script: 
  - cd api
  - yarn install --frozen-lockfile

script:
  - yarn lint
 # - yarn test  # --coverage
  - yarn build